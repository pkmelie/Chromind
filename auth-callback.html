<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ChroMind — Connexion…</title>
  <style>
    body{background:#0a0a0f;color:#f0f0f5;font-family:'Syne',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:1rem}
    .spinner{width:40px;height:40px;border:3px solid #1e1e2e;border-top-color:#f0f0f5;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{font-size:14px;color:#555;letter-spacing:2px;font-family:'Space Mono',monospace}
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>connexion en cours…</p>
  <script>
    (async () => {
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const accessToken  = hash.get('access_token');
      const refreshToken = hash.get('refresh_token');
      if (accessToken) {
        localStorage.setItem('cm_token',   accessToken);
        localStorage.setItem('cm_refresh', refreshToken || '');
        localStorage.setItem('cm_oauth_pending', '1');
      }
      window.location.href = '/';
    })();
  </script>
</body>
</html>
